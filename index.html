<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Landesgericht Falkenheim – Zugang</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f5f5f5;

            /* HIER dein Wallpaper eintragen */
            background: url("WALLPAPER.jpg") center center / cover no-repeat fixed;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, rgba(0,0,0,0.55), rgba(0,0,0,0.85));
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 28px 30px 26px;
            border-radius: 18px;
            background: rgba(10, 10, 15, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.7);
        }

        .badge {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #c0c6d8;
            margin-bottom: 6px;
        }

        h1 {
            font-size: 22px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #c7ccdd;
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #dde2f2;
        }

        .field-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        input[type="password"] {
            width: 100%;
            padding: 11px 40px 11px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(5, 7, 15, 0.85);
            color: #f5f5f5;
            font-size: 14px;
            outline: none;
            transition: border 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        input[type="password"]::placeholder {
            color: #8f96aa;
        }

        input[type="password"]:focus {
            border-color: #f5c451;
            box-shadow: 0 0 0 1px rgba(245, 196, 81, 0.55);
            background: rgba(5, 7, 15, 0.95);
        }

        .icon-lock {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #f5c451;
            pointer-events: none;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 11px 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #f5c451, #e29b2f);
            color: #1b1305;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.65);
        }

        button:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.75);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.6);
        }

        .msg {
            min-height: 18px;
            font-size: 12px;
            margin-top: 6px;
        }

        .msg.error {
            color: #ff8b8b;
        }

        .msg.info {
            color: #c7ccdd;
        }

        .footer {
            margin-top: 14px;
            font-size: 11px;
            color: #9aa1b6;
        }

        .footer span {
            opacity: 0.85;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="card">
    <div class="badge">Zugangskontrolle</div>
    <h1>Landesgericht Falkenheim</h1>
    <div class="subtitle">Bitte geben Sie das interne Kennwort ein, um fortzufahren.</div>

    <label for="pw">Passwort</label>
    <div class="field-wrapper">
        <input type="password" id="pw" placeholder="Internes Kennwort">
        <span class="icon-lock">🔒</span>
    </div>

    <button type="button" onclick="check()">Weiter</button>
    <div id="msg" class="msg info">Unbefugter Zugriff ist untersagt.</div>

    <div class="footer">
        <span>Fiktive Einrichtung im Rahmen eines Rollenspielprojekts.</span>
    </div>
</div>

<script>
    function check() {
        const password = "Falkenheim";
        const targetUrl = "https://sites.google.com/view/landesgericht/startseite";

        const input = document.getElementById("pw").value.trim();
        const msg = document.getElementById("msg");

        if (!input) {
            msg.textContent = "Bitte ein Passwort eingeben.";
            msg.className = "msg error";
            return;
        }

        if (input === password) {
            msg.textContent = "Zugang gewährt. Weiterleitung...";
            msg.className = "msg info";
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 400);
