<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Landesgericht Falkenheim – Zugang</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: "Segoe UI", system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Wallpaper */
            background: url("Banner_landesgericht.png") center/cover no-repeat fixed;
            color: #e8e8e8;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            z-index: 0;
        }

        .panel {
            position: relative;
            z-index: 1;
            width: 430px;
            padding: 45px 38px 38px;
            background: rgba(10, 10, 15, 0.78);
            border-radius: 18px;
            border: 1px solid rgba(255, 215, 128, 0.25);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            animation: fadeIn 0.8s ease;
            text-align: center;
        }

        /* Logo */
        .logo {
            width: 110px;
            height: auto;
            margin: 0 auto 18px;
            display: block;
            filter: drop-shadow(0 0 6px rgba(0,0,0,0.6));
        }

        .panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #f5c451, transparent);
        }

        h1 {
            font-size: 22px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: #f5c451;
        }

        .subtitle {
            font-size: 13px;
            color: #c7c7c7;
            margin-bottom: 28px;
        }

        label {
            font-size: 13px;
            margin-bottom: 6px;
            display: block;
            text-align: left;
        }

        .input-wrap {
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 42px 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 128, 0.25);
            background: rgba(20, 20, 28, 0.85);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s ease;
        }

        input[type="password"]:focus {
            border-color: #f5c451;
            box-shadow: 0 0 6px rgba(245, 196, 81, 0.5);
        }

        .icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: #f5c451;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #f5c451, #d89a2b);
            color: #1b1305;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.15s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.55);
        }

        button:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        #msg {
            margin-top: 10px;
            font-size: 12px;
            min-height: 18px;
        }

        .error {
            color: #ff8b8b;
        }

        .info {
            color: #c7c7c7;
        }

        .footer {
            margin-top: 18px;
            font-size: 11px;
            text-align: center;
            color: #9a9a9a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="panel">

    <!-- Logo -->
    <img src="Landesgericht_adler.png" alt="Gerichtssiegel" class="logo">

    <h1>Landesgericht Falkenheim</h1>
    <div class="subtitle">Interner Zugang – Kennwort erforderlich</div>

    <label for="pw">Passwort</label>
    <div class="input-wrap">
        <input type="password" id="pw" placeholder="Kennwort eingeben">
        <span class="icon">🔒</span>
    </div>

    <button onclick="check()">Weiter</button>
    <div id="msg" class="info">Unbefugter Zugriff ist untersagt.</div>

    <div class="footer">Fiktive Behörde im Rahmen eines Rollenspielprojekts.</div>
</div>

<script>
    function check() {
        const password = "Falkenheim";
        const targetUrl = "https://sites.google.com/view/landesgericht/startseite";

        const input = document.getElementById("pw").value.trim();
        const msg = document.getElementById("msg");

        if (!input) {
            msg.textContent = "Bitte ein Passwort eingeben.";
            msg.className = "error";
            return;
        }

        if (input === password) {
            msg.textContent = "Zugang gewährt. Weiterleitung...";
            msg.className = "info";
            setTimeout(() => window.location.href = targetUrl, 400);
        } else {
            msg.textContent = "Falsches Passwort.";
            msg.className = "error";
        }
    }

    document.getElementById("pw").addEventListener("keydown", e => {
        if (e.key === "Enter") check();
    });
</script>

</body>
</html>
