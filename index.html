<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Passwortschutz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }
        input {
            padding: 10px;
            width: 200px;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Passwort eingeben</h2>
    <input type="password" id="pw" placeholder="Passwort">
    <br>
    <button onclick="check()">Weiter</button>
    <p id="msg" style="color:red;"></p>
</div>

<script>
function check() {
    const password = "DEINPASSWORT"; // Passwort hier eintragen
    const input = document.getElementById("pw").value;

    if (input === password) {
        window.location.href = "https://sites.google.com/DEINE-SEITE"; // Zielseite
    } else {
        document.getElementById("msg").innerText = "Falsches Passwort.";
    }
}
</script>

</body>
</html>
